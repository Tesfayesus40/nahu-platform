# Config-as-code for the nahu-api Railway service (NestJS API).
# Admin Web must NOT use this file — see apps/admin-web/railway.toml.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
