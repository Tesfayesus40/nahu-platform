services:
  postgres:
    image: postgres:16-alpine
    container_name: nahu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nahu_platform
    ports:
      - "5432:5432"
    volumes:
      - nahu_pg_data:/var/lib/postgresql/data
      - ./database/migrations:/migrations:ro
      - ./database/docker/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nahu_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nahu_pg_data:
